<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>سكينة — القرآن الكريم</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☪️</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;
  --gold-light:#e8c97a;
  --gold-dark:#8b6914;
  --bg:#0a1628;
  --bg2:#0d1e35;
  --bg3:#112244;
  --card:rgba(10,22,40,0.95);
  --text:#f0e6c8;
  --muted:#8a9ab5;
  --border:rgba(201,168,76,0.25);
}

/* الوضع النهاري - تحسين وضوح الخط */
[data-theme="light"] {
  --bg:#fef9e8;
  --bg2:#fff3e0;
  --bg3:#fff0e0;
  --card:rgba(255,245,230,0.98);
  --text:#1e2a2a;
  --muted:#5a6e6e;
  --border:rgba(150,120,50,0.3);
}

[data-theme="light"] .ayah-text,
[data-theme="light"] .thikr-text,
[data-theme="light"] .sahaba-quote,
[data-theme="light"] .detail-section-body {
  color: #000000 !important;
  font-weight: 500;
}

[data-theme="light"] .surah-name,
[data-theme="light"] .sahaba-name,
[data-theme="light"] .page-title {
  color: #6b3f00 !important;
}

[data-theme="light"] .surah-card,
[data-theme="light"] .sahaba-card,
[data-theme="light"] .thikr-card {
  background: #fff9f0 !important;
  border-color: rgba(139,105,20,0.3) !important;
}

[data-theme="light"] .prayer-item {
  background: rgba(201,168,76,0.15) !important;
}

[data-theme="light"] .prayer-time {
  color: #6b3f00 !important;
}

[data-theme="light"] .tafsir-box {
  background: #fef4e2 !important;
  color: #2d4a3b !important;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Cairo',sans-serif;background:#050d1a !important;color:#f0e6c8;}
body{background-color:#050d1a !important;transition:all 0.3s ease;}
[data-theme="light"] body{background:#fef9e8 !important;}
.app{display:flex;flex-direction:column;min-height:100vh;}

/* القائمة العلوية القابلة للتمرير */
.top-nav {
  background: rgba(6,14,30,0.95);
  backdrop-filter: blur(12px);
  display: flex;
  overflow-x: auto;
  white-space: nowrap;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  padding: 10px 12px;
  gap: 8px;
  border-bottom: 1px solid rgba(201,168,76,0.3);
  position: sticky;
  top: 0;
  z-index: 200;
}
.top-nav::-webkit-scrollbar { height: 3px; }
.top-nav::-webkit-scrollbar-track { background: rgba(201,168,76,0.1); }
.top-nav::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
[data-theme="light"] .top-nav { background: rgba(255,245,235,0.95); }
.nav-btn-top {
  background: transparent;
  border: none;
  padding: 8px 18px;
  font-size: 0.9rem;
  font-weight: 600;
  color: #a0b4cc;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  border-radius: 40px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.nav-btn-top.active {
  background: rgba(201,168,76,0.2);
  color: var(--gold);
}
[data-theme="light"] .nav-btn-top.active {
  background: #e8dbba;
  color: #8b6914;
}

/* باقي الأنماط */
.sidebar{width:100%;background:#060e1e;border-bottom:1px solid rgba(201,168,76,0.25);display:flex;flex-direction:row;align-items:center;flex-wrap:wrap;padding:0;}
[data-theme="light"] .sidebar{background:#fff5e6;}
.main{flex:1;}
.sidebar-header{padding:24px 20px;border-bottom:1px solid var(--border);text-align:center;}
.logo-arabic{font-family:'Amiri',serif;font-size:36px;color:var(--gold);line-height:1;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:4px;margin-top:4px;}

/* أوقات الصلاة */
.prayer-box{padding:10px 16px;border-bottom:1px solid var(--border);display:block;width:100%;}
.section-label{font-size:9px;color:#a0b4cc;letter-spacing:3px;margin-bottom:8px;text-align:center;font-weight:600;}
.prayer-grid{display:flex;flex-direction:row;gap:6px;overflow-x:auto;justify-content:space-between;}
.prayer-item{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);padding:8px 12px;text-align:center;border-radius:4px;flex:1;min-width:60px;}
.prayer-name{font-size:9px;color:#a0b4cc;margin-bottom:4px;font-weight:600;}
.prayer-time{font-size:13px;color:var(--gold);font-weight:700;}
.next-prayer-banner{margin-top:8px;padding:7px 12px;background:linear-gradient(90deg,rgba(201,168,76,0.2),rgba(201,168,76,0.08));border:1px solid rgba(201,168,76,0.4);text-align:center;font-size:12px;color:#e8c97a;font-weight:600;border-radius:4px;}

/* قائمة التنقل الجانبية */
nav{display:flex;flex-direction:row;padding:8px;gap:4px;flex:1;}
.nav-btn{width:100%;padding:11px 14px;background:transparent;border:none;border-right:3px solid transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;text-align:right;transition:all 0.2s;}
.nav-btn:hover{background:rgba(201,168,76,0.08);color:var(--gold);}
.nav-btn.active{background:rgba(201,168,76,0.12);color:var(--gold);}
.nav-icon{font-size:18px;min-width:26px;}

/* صفحة القرآن */
.page{display:none;}
.page.active{display:block;}
.surah-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:12px 28px 28px;}
.surah-card{padding:16px;background:#0a1628;border:1px solid rgba(201,168,76,0.2);cursor:pointer;transition:all 0.2s;border-radius:12px;}
[data-theme="light"] .surah-card{background:#fff9f0;}
.surah-name{font-family:'Amiri',serif;font-size:22px;color:var(--gold);margin-bottom:2px;}
.surah-num{width:32px;height:32px;border:1px solid var(--gold-dark);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;margin-bottom:8px;}

/* الآيات */
.ayah-wrap{max-width:860px;margin:0 auto;padding:24px 32px;}
.ayah{padding:18px 0;border-bottom:1px solid rgba(201,168,76,0.07);cursor:pointer;transition:all 0.2s;}
.ayah.playing{background:rgba(201,168,76,0.07);border-right:3px solid var(--gold);padding-right:12px;}
.ayah-text{font-family:'Amiri Quran',serif;font-size:28px;line-height:2.5;text-align:right;direction:rtl;color:var(--text);}
[data-theme="light"] .ayah-text{color:#000000 !important;font-weight:500;}

/* التفسير */
.tafsir-box {
  display: none;
  margin-top: 12px;
  padding: 16px;
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  border-right: 3px solid var(--gold);
  font-family: 'Amiri', serif;
  font-size: 16px;
  line-height: 1.8;
  color: #d4c9a8;
}
[data-theme="light"] .tafsir-box {
  background: #fef4e2;
  color: #2d4a3b;
}
.tafsir-box.open { display: block; }
.tafsir-btn {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  color: var(--gold);
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
}

/* الرقية الشرعية */
.ruqyah-card {
  background: rgba(201,168,76,0.08);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
[data-theme="light"] .ruqyah-card {
  background: #fff9f0;
}

/* الصحابة */
.sahaba-filter{padding:7px 16px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;transition:all 0.2s;border-radius:20px;}
.sahaba-filter:hover,.sahaba-filter.active{background:rgba(184,134,11,0.12);border-color:var(--gold);color:var(--gold);}
.sahaba-card{padding:20px;background:#0a1628;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;border-radius:12px;margin-bottom:12px;}
[data-theme="light"] .sahaba-card{background:#fff9f0;}
.sahaba-name{font-family:'Amiri',serif;font-size:22px;color:var(--gold);margin-bottom:4px;}
.sahaba-quote{font-family:'Amiri',serif;font-size:15px;color:var(--text);line-height:1.7;border-right:3px solid var(--gold);padding-right:10px;margin-bottom:10px;}

/* الأذكار */
.athkar-tabs{display:flex;gap:8px;padding:20px 28px 0;flex-wrap:wrap;}
.athkar-tab{padding:9px 20px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);color:#c8d8e8;cursor:pointer;font-size:13px;transition:all 0.2s;border-radius:20px;}
.athkar-tab.active{background:rgba(201,168,76,0.2);color:var(--gold);}
.thikr-card{padding:24px;background:#0a1628;border:1px solid var(--border);border-radius:12px;margin-bottom:12px;}
[data-theme="light"] .thikr-card{background:#fff9f0;}
.thikr-text{font-family:'Amiri',serif;font-size:22px;color:var(--text);line-height:2;text-align:center;}
.counter-wrap{display:flex;flex-direction:column;align-items:center;margin-top:14px;}
.counter-num{font-size:32px;color:var(--gold);font-weight:700;}
.counter-btn{width:60px;height:60px;border-radius:50%;background:rgba(201,168,76,0.1);border:2px solid var(--gold-dark);color:var(--gold);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:8px;}

/* زر الوضع */
.theme-fixed-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  padding: 10px 16px;
  background: rgba(201,168,76,0.2);
  border: 1px solid var(--gold);
  color: var(--gold);
  border-radius: 40px;
  cursor: pointer;
  z-index: 999;
  font-family: 'Cairo', sans-serif;
  backdrop-filter: blur(8px);
}

@media(max-width:768px){
  .surah-grid{grid-template-columns:1fr;padding:12px 16px;}
  .ayah-text{font-size:22px;}
  .top-nav{padding:8px 10px;}
  .nav-btn-top{padding:6px 14px;font-size:0.8rem;}
}
</style>
</head>
<body>
<div class="app">
  <!-- القائمة العلوية القابلة للتمرير -->
  <div class="top-nav" id="topNav">
    <button class="nav-btn-top active" onclick="showMainPage('quran',this)">📖 القرآن الكريم</button>
    <button class="nav-btn-top" onclick="showMainPage('sahaba',this)">🌟 الصحابة</button>
    <button class="nav-btn-top" onclick="showMainPage('athkar',this)">📿 الأذكار</button>
    <button class="nav-btn-top" onclick="showMainPage('ruqyah',this)">🕋 الرقية الشرعية</button>
  </div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-arabic">سكينة</div>
      <div class="logo-sub">القرآن الكريم • الأذكار • الصحابة</div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px;">Created by <span style="color:var(--gold);">Alfahad</span></div>
    </div>

    <div class="prayer-box">
      <div class="section-label">أوقات الصلاة</div>
      <div class="prayer-grid">
        <div class="prayer-item"><div class="prayer-name">الفجر</div><div class="prayer-time" id="p-fajr">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">الظهر</div><div class="prayer-time" id="p-dhuhr">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">العصر</div><div class="prayer-time" id="p-asr">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">المغرب</div><div class="prayer-time" id="p-maghrib">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">العشاء</div><div class="prayer-time" id="p-isha">--:--</div></div>
      </div>
      <div class="next-prayer-banner" id="nextPrayer">⏳ جاري تحديد موقعك...</div>
      <div id="locationPermBox" style="display:none;margin-top:8px;padding:10px;background:rgba(201,168,76,0.1);text-align:center;">
        <div style="font-size:11px;margin-bottom:8px;">📍 اختر مدينتك</div>
        <select id="citySelect" style="width:100%;padding:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;">
          <option value="Riyadh">الرياض</option>
          <option value="Mecca">مكة المكرمة</option>
          <option value="Medina">المدينة المنورة</option>
          <option value="Jeddah">جدة</option>
          <option value="Dammam">الدمام</option>
        </select>
        <button onclick="loadByCity()" style="width:100%;padding:8px;margin-top:8px;background:rgba(184,134,11,0.15);border:1px solid var(--gold);color:var(--gold);cursor:pointer;border-radius:8px;">تأكيد</button>
      </div>
    </div>

    <nav>
      <button class="nav-btn active" onclick="showPage('quran',this)"><span class="nav-icon">📖</span> القرآن الكريم</button>
      <button class="nav-btn" onclick="showPage('sahaba',this)"><span class="nav-icon">🌟</span> صحابة الرسول ﷺ</button>
      <button class="nav-btn" onclick="showPage('athkar',this)"><span class="nav-icon">📿</span> الأذكار</button>
      <button class="nav-btn" onclick="showPage('ruqyah',this)"><span class="nav-icon">🕋</span> الرقية الشرعية</button>
    </nav>

    <div class="reader-box" style="padding:8px 14px;display:flex;align-items:center;gap:8px;">
      <div class="reader-label">اختر القارئ</div>
      <select class="reader-select" id="readerSelect" onchange="changeReader()" style="padding:6px 10px;background:rgba(201,168,76,0.1);border:1px solid var(--border);color:#e8c97a;border-radius:8px;">
        <option value="Alafasy_128kbps">مشاري راشد العفاسي</option>
        <option value="Abdurrahmaan_As-Sudais_192kbps">عبدالرحمن السديس</option>
        <option value="Husary_128kbps">محمود خليل الحصري</option>
        <option value="Minshawy_Murattal_128kbps">محمد صديق المنشاوي</option>
        <option value="Yasser_Ad-Dussary_128kbps">ياسر الدوسري</option>
        <option value="Ghamadi_40kbps">سعد الغامدي</option>
      </select>
    </div>
  </aside>

  <main class="main">
    <!-- صفحة القرآن -->
    <div id="page-quran" class="page active">
      <div id="list-view">
        <div class="topbar" style="padding:14px 20px;border-bottom:1px solid var(--border);"><div class="page-title">القرآن الكريم</div><div>١١٤ سورة</div></div>
        <div class="surah-search-wrap" style="padding:14px 20px;"><input class="search-input" id="surahSearch" placeholder="ابحث عن سورة..." oninput="filterSurahs()" style="width:100%;padding:12px;background:rgba(201,168,76,0.05);border:1px solid var(--border);border-radius:8px;"/></div>
        <div class="surah-grid" id="surahGrid"><div class="loading-wrap">جاري التحميل...</div></div>
      </div>
      <div id="reader-view" style="display:none">
        <button class="back-btn" onclick="backToList()" style="margin:12px 20px;padding:6px 16px;background:transparent;border:1px solid var(--border);border-radius:8px;">← العودة للسور</button>
        <div class="reader-hero" style="padding:16px;text-align:center;"><div class="reader-surah-name" style="font-family:'Amiri';font-size:28px;color:var(--gold);" id="readerName"></div></div>
        <div class="ayah-wrap" id="ayahWrap"></div>
      </div>
    </div>

    <!-- صفحة الصحابة -->
    <div id="page-sahaba" class="page">
      <div style="padding:16px 20px;"><div style="font-family:'Amiri',serif;font-size:24px;color:var(--gold);">🌟 صحابة الرسول ﷺ</div></div>
      <div style="padding:0 20px 12px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="sahaba-filter active" onclick="filterSahaba('all',this)">الكل</button>
        <button class="sahaba-filter" onclick="filterSahaba('10',this)">العشرة المبشرون</button>
        <button class="sahaba-filter" onclick="filterSahaba('leader',this)">القادة</button>
        <button class="sahaba-filter" onclick="filterSahaba('early',this)">السابقون</button>
        <button class="sahaba-filter" onclick="filterSahaba('wives',this)">زوجات النبي</button>
      </div>
      <div id="sahabaGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:16px 20px;"></div>
    </div>

    <!-- صفحة الأذكار -->
    <div id="page-athkar" class="page">
      <div style="padding:16px 20px;"><div style="font-family:'Amiri',serif;font-size:24px;color:var(--gold);">📿 الأذكار اليومية</div></div>
      <div class="athkar-tabs">
        <button class="athkar-tab active" onclick="showAthkar('morning',this)">🌅 أذكار الصباح</button>
        <button class="athkar-tab" onclick="showAthkar('evening',this)">🌙 أذكار المساء</button>
        <button class="athkar-tab" onclick="showAthkar('sleep',this)">😴 أذكار النوم</button>
      </div>
      <div id="athkarContent" style="padding:20px;"></div>
    </div>

    <!-- صفحة الرقية الشرعية -->
    <div id="page-ruqyah" class="page">
      <div style="padding:16px 20px;"><div style="font-family:'Amiri',serif;font-size:24px;color:var(--gold);">🕋 الرقية الشرعية</div></div>
      <div id="ruqyahContent" style="padding:20px;"></div>
    </div>
  </main>
</div>
<audio id="audioEl"></audio>

async function loadPrayer() {
  try {
    const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 5000}));
    const {latitude, longitude} = pos.coords;
    const date = new Date();
    const res = await fetch(`https://api.aladhan.com/v1/timings/${date.getDate()}-${date.getMonth()+1}-${date.getFullYear()}?latitude=${latitude}&longitude=${longitude}&method=4`);
    const data = await res.json();
    if(data.data) {
      const t = data.data.timings;
      document.getElementById('p-fajr').innerHTML = t.Fajr?.slice(0,5) || '--:--';
      document.getElementById('p-dhuhr').innerHTML = t.Dhuhr?.slice(0,5) || '--:--';
      document.getElementById('p-asr').innerHTML = t.Asr?.slice(0,5) || '--:--';
      document.getElementById('p-maghrib').innerHTML = t.Maghrib?.slice(0,5) || '--:--';
      document.getElementById('p-isha').innerHTML = t.Isha?.slice(0,5) || '--:--';
      document.getElementById('nextPrayer').innerHTML = `🕌 تم تحديث الأوقات بنجاح`;
    }
    document.getElementById('locationPermBox').style.display = 'none';
  } catch(e) {
    document.getElementById('locationPermBox').style.display = 'block';
    document.getElementById('nextPrayer').innerHTML = '📍 اختر مدينتك لعرض أوقات الصلاة';
  }
}

function loadByCity() {
  const city = document.getElementById('citySelect').value;
  updatePrayerTimes(city);
  document.getElementById('locationPermBox').style.display = 'none';
}

function renderSurahList() {
  const searchVal = document.getElementById('surahSearch')?.value || '';
  const filtered = surahNames.filter((name, i) => name.includes(searchVal) || (i+1).toString().includes(searchVal));
  document.getElementById('surahGrid').innerHTML = filtered.map((name, idx) => {
    const originalIdx = surahNames.indexOf(name);
    return `<div class="surah-card" onclick="openSurah(${originalIdx+1})"><div class="surah-num">${originalIdx+1}</div><div class="surah-name">${name}</div><div class="surah-english">سورة</div></div>`;
  }).join('');
}

async function openSurah(num) {
  selectedSurah = num;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('reader-view').style.display = 'block';
  document.getElementById('readerName').textContent = surahNames[num-1];
  document.getElementById('ayahWrap').innerHTML = '<div class="loading-wrap">جاري تحميل الآيات...</div>';
  
  try {
    const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}`);
    const data = await res.json();
    curAyahs = data.data.ayahs;
    renderAyahsWithTafsir();
  } catch(e) {
    document.getElementById('ayahWrap').innerHTML = '<div style="color:#ff6b6b;padding:40px;text-align:center">تعذر تحميل الآيات</div>';
  }
}

async function renderAyahsWithTafsir() {
  document.getElementById('ayahWrap').innerHTML = curAyahs.map((a, i) => `
    <div class="ayah" id="ay-${i}">
      <div class="ayah-text" onclick="playAyah(${i})">${a.text}<span class="ayah-num" style="display:inline-flex;width:30px;height:30px;border:1px solid var(--gold-dark);border-radius:50%;margin:0 6px;justify-content:center;align-items:center;">${a.numberInSurah}</span></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
        <button class="tafsir-btn" onclick="toggleTafsir(event,${selectedSurah},${a.numberInSurah},${i})" id="tafsir-btn-${i}">📖 التفسير الميسر</button>
      </div>
      <div class="tafsir-box" id="tafsir-box-${i}">
        <div class="tafsir-loading">جاري تحميل التفسير...</div>
      </div>
    </div>
  `).join('');
}

async function toggleTafsir(e, surah, ayah, idx) {
  e.stopPropagation();
  const box = document.getElementById(`tafsir-box-${idx}`);
  const btn = document.getElementById(`tafsir-btn-${idx}`);
  if(box.classList.contains('open')) {
    box.classList.remove('open');
    btn.textContent = '📖 التفسير الميسر';
    return;
  }
  box.classList.add('open');
  btn.textContent = '▲ إخفاء التفسير';
  if(box.getAttribute('data-loaded') === '1') return;
  
  try {
    const res = await fetch(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/ar.muyassar`);
    const data = await res.json();
    if(data.status === 'OK' && data.data) {
      box.innerHTML = `<div class="tafsir-text">${data.data.text}</div><div style="font-size:10px;margin-top:8px;">📚 التفسير الميسر</div>`;
      box.setAttribute('data-loaded', '1');
    } else {
      box.innerHTML = '<div class="tafsir-text">تعذر تحميل التفسير</div>';
    }
  } catch(e) {
    box.innerHTML = '<div class="tafsir-text">تعذر تحميل التفسير</div>';
  }
}

// ===== الصوت =====
function audioUrl(sNum, aNum) {
  return `https://everyayah.com/data/${reader}/${String(sNum).padStart(3,'0')}${String(aNum).padStart(3,'0')}.mp3`;
}

function playAyah(i) {
  document.querySelectorAll('.ayah').forEach(a => a.classList.remove('playing'));
  const el = document.getElementById(`ay-${i}`);
  if(el) el.classList.add('playing');
  curIdx = i;
  audio.src = audioUrl(selectedSurah, curAyahs[i].numberInSurah);
  audio.play();
  playing = true;
}

function togglePlay() {
  if(playing) {
    audio.pause();
    playing = false;
  } else if(curAyahs.length) {
    playAyah(curIdx);
  }
}

function onEnded() {
  if(curIdx < curAyahs.length - 1) {
    playAyah(curIdx + 1);
  } else {
    playing = false;
  }
}

function stopAudio() {
  audio.pause();
  audio.src = '';
  playing = false;
}

function changeReader() {
  reader = document.getElementById('readerSelect').value;
  if(playing && curAyahs.length) playAyah(curIdx);
}

  document.querySelectorAll('.athkar-tab').forEach(t => t.classList.remove('active'));

  const items = athkar[cat] || [];
  document.getElementById('athkarContent').innerHTML = items.map((item, i) => {

    if(!cnt[key]) cnt[key] = 0;
    return `<div class="thikr-card">
      <div class="thikr-text">${item.t}</div>
      <div class="thikr-source" style="font-size:11px;color:var(--muted);margin-top:8px;">📚 ${item.s} — ${item.c}</div>
      <div class="counter-wrap">
        <div class="counter-num" id="cn-${key}">${cnt[key]}</div>
        <button class="counter-btn" onclick="inc('${key}')">+</button>
      </div>
    </div>`;
  }).join('');
}

function inc(k) {
  cnt[k] = (cnt[k] || 0) + 1;
  const el = document.getElementById(`cn-${k}`);

}

    return `<div class="ruqyah-card">
      <div class="thikr-text" style="font-family:'Amiri Quran',serif;font-size:20px;">${item.text}</div>
      <div class="thikr-source" style="font-size:11px;color:var(--muted);margin-top:8px;">📚 ${item.source}</div>
      <div class="counter-wrap">
        <div class="counter-num" id="cn-${key}">${cnt[key]}</div>
        <button class="counter-btn" onclick="inc('${key}')">+</button>
      </div>
    </div>`;
  }).join('');
}

// ===== الوضع النهاري/الليلي =====
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  const btn = document.getElementById('themeBtn');
  if(btn) btn.innerHTML = isLight ? '🌙 ليلي' : '☀️ نهاري';
  localStorage.setItem('sakeena-theme', isLight ? 'dark' : 'light');
}

// ===== التهيئة =====
function init() {
  renderSurahList();
  loadPrayer();
  showAthkar('morning', document.querySelector('.athkar-tab'));
  renderSahaba('all');
  showRuqyah();
  
  const savedTheme = localStorage.getItem('sakeena-theme');
  if(savedTheme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
  
  // إضافة زر الوضع
  const themeBtn = document.createElement('button');
  themeBtn.id = 'themeBtn';
  themeBtn.innerHTML = document.documentElement.getAttribute('data-theme') === 'light' ? '☀️ نهاري' : '🌙 ليلي';
  themeBtn.className = 'theme-fixed-btn';
  themeBtn.onclick = toggleTheme;
  document.body.appendChild(themeBtn);
  
  audio.onended = onEnded;
}

init();
</script>
</body>
</html>
