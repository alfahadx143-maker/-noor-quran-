!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سكينة — القرآن الكريم</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☪️</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c; --gold-light:#e8c97a; --gold-dark:#8b6914;
  --bg:#0a1628; --bg2:#0d1e35; --bg3:#112244;
  --card:rgba(10,22,40,0.95); --text:#f0e6c8; --muted:#8a9ab5;
  --border:rgba(201,168,76,0.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Cairo',sans-serif;background:#050d1a !important;color:#f0e6c8;}
body{background-color:#050d1a !important;background-image:none !important;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.sidebar{width:100%;background:#060e1e;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.5);display:flex;flex-direction:column;}
.main{flex:1;}

/* SIDEBAR HEADER */
.sidebar-header{padding:24px 20px;border-bottom:1px solid var(--border);text-align:center;background:linear-gradient(180deg,rgba(201,168,76,0.08),transparent);}
.logo-arabic{font-family:'Amiri',serif;font-size:36px;color:var(--gold);line-height:1;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:4px;margin-top:4px;}
.logo-ornament{color:var(--gold);opacity:0.5;font-size:16px;margin-top:8px;letter-spacing:6px;}

/* CLOCK & DATE */
#clockDisplay{font-family:'Cairo',sans-serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px;}
#dateHijri{font-family:'Amiri',serif;font-size:13px;color:var(--gold-light);margin-bottom:3px;}
#dateGregorian{font-family:'Cairo',sans-serif;font-size:11px;color:var(--muted);}

/* THEME BUTTON */
#themeBtn{padding:5px 12px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:var(--gold);cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;border-radius:20px;transition:all 0.2s;}

/* GENERAL STYLES */
.prayer-box{padding:10px 16px;border-bottom:1px solid var(--border);}
.section-label{font-size:9px;color:#a0b4cc;letter-spacing:3px;margin-bottom:8px;text-align:center;font-weight:600;}
.prayer-grid{display:flex;flex-direction:row;gap:6px;overflow-x:auto;justify-content:space-between;}
.prayer-item{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);padding:8px 12px;text-align:center;border-radius:4px;flex:1;min-width:60px;}
.prayer-name{font-size:9px;color:#a0b4cc;margin-bottom:4px;font-weight:600;white-space:nowrap;}
.prayer-time{font-size:13px;color:var(--gold);font-weight:700;font-family:'Cairo',sans-serif;white-space:nowrap;}
.prayer-time.next{color:var(--gold-light);text-shadow:0 0 10px rgba(201,168,76,0.5);}
.next-prayer-banner{margin-top:8px;padding:7px 12px;background:linear-gradient(90deg,rgba(201,168,76,0.2),rgba(201,168,76,0.08));border:1px solid rgba(201,168,76,0.4);text-align:center;font-size:12px;color:#e8c97a;font-weight:600;border-radius:4px;}

/* NAVIGATION */
nav{display:flex;flex-direction:row;padding:8px;gap:4px;flex:1;}
.nav-btn{width:100%;padding:11px 14px;margin-bottom:3px;background:transparent;border:none;border-right:3px solid transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;font-family:'Cairo',sans-serif;text-align:right;transition:all 0.2s;border-radius:2px;}
.nav-btn:hover{background:rgba(201,168,76,0.08);color:var(--gold);}
.nav-btn.active{background:rgba(201,168,76,0.12);border-bottom-color:var(--gold);color:var(--gold);}
.nav-icon{font-size:18px;min-width:26px;text-align:center;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-arabic">سكينة</div>
      <div class="logo-sub">القرآن الكريم</div>
      <div class="logo-ornament">❖ ✦ ❖</div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:1px;">Created by <span style="color:var(--gold);font-weight:700;">Alfahad</span> ✦</div>
    </div>
    <div style="padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(201,168,76,0.04);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div id="clockDisplay">--:--:--</div>
        <button onclick="toggleTheme()" id="themeBtn">🌙 ليلي</button>
      </div>
      <div id="dateHijri">جاري تحميل التاريخ...</div>
      <div id="dateGregorian"></div>
    </div>

    <div class="prayer-box">
      <div class="section-label">أوقات الصلاة</div>
      <div class="prayer-grid">
        <div class="prayer-item"><div class="prayer-name">الفجر</div><div class="prayer-time" id="p-fajr">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">الشروق</div><div class="prayer-time" id="p-sunrise">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">الظهر</div><div class="prayer-time" id="p-dhuhr">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">العصر</div><div class="prayer-time" id="p-asr">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">المغرب</div><div class="prayer-time" id="p-maghrib">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">العشاء</div><div class="prayer-time" id="p-isha">--:--</div></div>
      </div>
      <div class="next-prayer-banner" id="nextPrayer">⏳ جاري تحديد موقعك...</div>
    </div>
    <script>
// ===== CLOCK =====
function updateClock() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    h = h < 10 ? "0"+h : h;
    m = m < 10 ? "0"+m : m;
    s = s < 10 ? "0"+s : s;
    document.getElementById("clockDisplay").innerText = h + ":" + m + ":" + s;
}
setInterval(updateClock, 1000);
updateClock();

// ===== THEME TOGGLE =====
function toggleTheme() {
    document.body.classList.toggle("dark-theme");
    const btn = document.getElementById("themeBtn");
    if(document.body.classList.contains("dark-theme")) btn.innerText="☀️ نهاري";
    else btn.innerText="🌙 ليلي";
}

// ===== DATE HIJRI & GREGORIAN =====
async function loadDates() {
    try {
        const res = await fetch("https://api.aladhan.com/v1/gToH?date=" + new Date().toLocaleDateString("en-CA"));
        const data = await res.json();
        document.getElementById("dateHijri").innerText = `${data.data.hijri.day} ${data.data.hijri.month.ar} ${data.data.hijri.year} هـ`;
    } catch(e){ console.log(e); }
    const now = new Date();
    document.getElementById("dateGregorian").innerText = now.toLocaleDateString("ar-SA", {weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
loadDates();

// ===== PRAYER TIMES =====
async function loadPrayerTimes() {
    try {
        const position = await new Promise((resolve,reject)=>{
            navigator.geolocation.getCurrentPosition(resolve,reject);
        });
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=4`);
        const data = await res.json();
        const times = data.data.timings;
        document.getElementById("p-fajr").innerText = times.Fajr;
        document.getElementById("p-sunrise").innerText = times.Sunrise;
        document.getElementById("p-dhuhr").innerText = times.Dhuhr;
        document.getElementById("p-asr").innerText = times.Asr;
        document.getElementById("p-maghrib").innerText = times.Maghrib;
        document.getElementById("p-isha").innerText = times.Isha;

        // ===== NEXT PRAYER =====
        const now = new Date();
        const prayerNames = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];
        let nextPrayer = "";
        let minDiff = Infinity;
        for(const p of prayerNames){
            const t = times[p].split(":");
            const prayerDate = new Date();
            prayerDate.setHours(parseInt(t[0]),parseInt(t[1]),0);
            const diff = prayerDate - now;
            if(diff>0 && diff<minDiff){ minDiff=diff; nextPrayer=p; }
        }
        const mapName = {Fajr:"الفجر",Dhuhr:"الظهر",Asr:"العصر",Maghrib:"المغرب",Isha:"العشاء"};
        if(nextPrayer) document.getElementById("nextPrayer").innerText = `🕌 الصلاة القادمة: ${mapName[nextPrayer]}`;
        else document.getElementById("nextPrayer").innerText = "🕌 انتهت جميع الصلوات لهذا اليوم";
    } catch(e){console.log(e); document.getElementById("nextPrayer").innerText="⚠️ لم يتم تحديد مواقيت الصلاة";}
}
loadPrayerTimes();
</script>

<!-- ===== PLACEHOLDERS FOR QURAN, AZKAR, SAHABA ===== -->
<div id="quran-section">
  <!-- هنا يمكنك إضافة سور وآيات القرآن -->
</div>

<div id="azkar-section">
  <!-- هنا يمكنك إضافة الأذكار اليومية -->
</div>

<div id="sahaba-section">
  <!-- هنا يمكنك إضافة أسماء الصحابة وزوجات الرسول -->
</div>

</div> <!-- نهاية .app -->
</body>
</html>
