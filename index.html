<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>سكينة — القرآن الكريم</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☪️</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-dark:#8b6914;
  --bg:#0a1628;--bg2:#0d1e35;--bg3:#112244;
  --card:rgba(10,22,40,0.95);--text:#f0e6c8;--muted:#8a9ab5;
  --border:rgba(201,168,76,0.25);
}
[data-theme="light"] {
  --bg:#fef9e8;--bg2:#fff3e0;--bg3:#fff0e0;
  --card:rgba(255,245,230,0.98);--text:#1e2a2a;--muted:#5a6e6e;
  --border:rgba(150,120,50,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Cairo',sans-serif;background:#050d1a !important;color:#f0e6c8;}
body{background-color:#050d1a !important;background-image:none !important;transition:all 0.3s ease;}
[data-theme="light"] body{background:#fef9e8 !important;}
.app{display:flex;flex-direction:column;min-height:100vh;}

/* القائمة العلوية - فوق */
.top-nav {
  background: rgba(6,14,30,0.95);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-around;
  padding: 12px 16px;
  gap: 8px;
  border-bottom: 1px solid rgba(201,168,76,0.3);
  position: sticky;
  top: 0;
  z-index: 200;
}
[data-theme="light"] .top-nav {
  background: rgba(255,245,235,0.95);
}
.nav-btn-top {
  background: transparent;
  border: none;
  padding: 10px 20px;
  font-size: 1rem;
  font-weight: 600;
  color: #a0b4cc;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  border-radius: 40px;
  transition: all 0.2s;
}
.nav-btn-top.active {
  background: rgba(201,168,76,0.2);
  color: var(--gold);
}
[data-theme="light"] .nav-btn-top.active {
  background: #e8dbba;
  color: #8b6914;
}

/* السايد بار - بدون ساعة */
.sidebar{width:100%;background:#060e1e;border-bottom:1px solid rgba(201,168,76,0.25);display:flex;flex-direction:row;align-items:center;flex-wrap:wrap;padding:0;}
[data-theme="light"] .sidebar{background:#fff5e6;}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);text-align:center;background:linear-gradient(180deg,rgba(201,168,76,0.08),transparent);}
.logo-arabic{font-family:'Amiri',serif;font-size:28px;color:var(--gold);line-height:1;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:4px;}
.prayer-box{padding:10px 16px;border-bottom:1px solid var(--border);display:block;width:100%;}
.section-label{font-size:9px;color:#a0b4cc;letter-spacing:3px;margin-bottom:8px;text-align:center;font-weight:600;}
.prayer-grid{display:flex;flex-direction:row;gap:6px;overflow-x:auto;justify-content:space-between;}
.prayer-item{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);padding:8px 12px;text-align:center;border-radius:4px;flex:1;min-width:60px;}
.prayer-name{font-size:9px;color:#a0b4cc;margin-bottom:4px;font-weight:600;}
.prayer-time{font-size:13px;color:var(--gold);font-weight:700;}
.next-prayer-banner{margin-top:8px;padding:7px 12px;background:linear-gradient(90deg,rgba(201,168,76,0.2),rgba(201,168,76,0.08));border:1px solid rgba(201,168,76,0.4);text-align:center;font-size:12px;color:#e8c97a;font-weight:600;border-radius:4px;}
nav{display:flex;flex-direction:row;padding:8px;gap:4px;flex:1;}
.nav-btn{padding:11px 14px;background:transparent;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;border-radius:2px;}
.nav-btn.active{background:rgba(201,168,76,0.12);color:var(--gold);}
.nav-icon{font-size:18px;}
.reader-box{padding:8px 14px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.reader-label{font-size:9px;color:#a0b4cc;white-space:nowrap;}
.reader-select{width:180px;padding:6px 10px;background:rgba(201,168,76,0.1);border:1px solid var(--border);color:#e8c97a;font-family:'Cairo',sans-serif;font-size:11px;outline:none;cursor:pointer;}
[data-theme="light"] .reader-select{background:#fff;color:#1e2a2a;}
.page{display:none;}
.page.active{display:block;}
.topbar{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(6,14,30,0.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
[data-theme="light"] .topbar{background:rgba(255,245,235,0.97);}
.page-title{font-family:'Amiri',serif;font-size:24px;color:var(--gold);}
.surah-search-wrap{padding:18px 28px 10px;}
.search-input{width:100%;padding:12px 16px;background:rgba(201,168,76,0.05);border:1px solid var(--border);color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;border-radius:40px;}
[data-theme="light"] .search-input{background:#fff;color:#1e2a2a;}
.surah-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:12px 28px 28px;}
.surah-card{padding:16px;background:#0a1628;border:1px solid rgba(201,168,76,0.2);cursor:pointer;transition:all 0.2s;border-radius:12px;}
[data-theme="light"] .surah-card{background:#fff5e6;}
.surah-card:hover{border-color:rgba(201,168,76,0.5);transform:translateY(-2px);}
.surah-num{width:32px;height:32px;border:1px solid var(--gold-dark);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;margin-bottom:8px;border-radius:50%;}
.surah-name{font-family:'Amiri',serif;font-size:22px;color:var(--gold);margin-bottom:2px;}
.surah-english{font-size:11px;color:var(--muted);margin-bottom:8px;}
.ayah-wrap{max-width:860px;margin:0 auto;padding:24px 32px;}
.ayah-text{font-family:'Amiri Quran',serif;font-size:28px;line-height:2.5;text-align:right;direction:rtl;color:var(--text);}
[data-theme="light"] .ayah-text{color:#1e2a2a !important;} /* الآيات سوداء في النهاري */
.ayah-num{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid var(--gold-dark);font-size:11px;border-radius:50%;margin:0 6px;vertical-align:middle;}
.thikr-text{font-family:'Amiri',serif;font-size:22px;color:var(--text);line-height:2;text-align:center;}
[data-theme="light"] .thikr-text{color:#1e2a2a;}
.hadith-text{font-family:'Amiri',serif;font-size:20px;line-height:1.8;color:var(--gold-light);margin-bottom:12px;}
[data-theme="light"] .hadith-text{color:#2c5a4a;}
.ruqyah-card{background:rgba(201,168,76,0.08);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.counter-btn{width:60px;height:60px;border-radius:50%;background:rgba(201,168,76,0.1);border:2px solid var(--gold-dark);color:var(--gold);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;}
@media (max-width:768px){.surah-grid{grid-template-columns:1fr;}.ayah-text{font-size:22px;}}
</style>
</head>
<body>
<div class="app">
  <!-- القائمة العلوية فوق (الفرق) -->
  <div class="top-nav">
    <button class="nav-btn-top" onclick="showPage('quran',this)">📖 القرآن الكريم</button>
    <button class="nav-btn-top" onclick="showPage('sahaba',this)">🌟 الصحابة</button>
    <button class="nav-btn-top" onclick="showPage('athkar',this)">📿 الأذكار</button>
    <button class="nav-btn-top" onclick="showPage('sources',this)">📚 المصادر</button>
  </div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-arabic">سكينة</div>
      <div class="logo-sub">القرآن الكريم • الأذكار • الصحابة</div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px;">Created by <span style="color:var(--gold);">Alfahad</span></div>
    </div>
    <div class="prayer-box">
      <div class="section-label">أوقات الصلاة</div>
      <div class="prayer-grid">
        <div class="prayer-item"><div class="prayer-name">الفجر</div><div class="prayer-time" id="p-fajr">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">الظهر</div><div class="prayer-time" id="p-dhuhr">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">العصر</div><div class="prayer-time" id="p-asr">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">المغرب</div><div class="prayer-time" id="p-maghrib">--:--</div></div>
        <div class="prayer-item"><div class="prayer-name">العشاء</div><div class="prayer-time" id="p-isha">--:--</div></div>
      </div>
      <div class="next-prayer-banner" id="nextPrayer">⏳ جاري تحديد موقعك...</div>
      <div id="locationPermBox" style="display:none;margin-top:8px;padding:10px;background:rgba(201,168,76,0.1);text-align:center;">
        <div style="font-size:11px;margin-bottom:8px;">📍 اختر مدينتك (المملكة فقط)</div>
        <select id="citySelect" style="width:100%;padding:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text);margin-bottom:8px;border-radius:8px;">
          <option value="Riyadh">الرياض</option>
          <option value="Mecca">مكة المكرمة</option>
          <option value="Medina">المدينة المنورة</option>
          <option value="Jeddah">جدة</option>
          <option value="Dammam">الدمام</option>
          <option value="Abha">أبها</option>
          <option value="Tabuk">تبوك</option>
          <option value="Buraidah">بريدة</option>
          <option value="Hail">حائل</option>
          <option value="Najran">نجران</option>
        </select>
        <button onclick="loadByCity()" style="width:100%;padding:8px;background:rgba(184,134,11,0.15);border:1px solid var(--gold);color:var(--gold);cursor:pointer;border-radius:8px;">تأكيد</button>
      </div>
    </div>
    <nav>
      <button class="nav-btn active" onclick="switchPage('quran',this)"><span class="nav-icon">📖</span> القرآن</button>
      <button class="nav-btn" onclick="switchPage('sahaba',this)"><span class="nav-icon">🌟</span> الصحابة</button>
      <button class="nav-btn" onclick="switchPage('athkar',this)"><span class="nav-icon">📿</span> الأذكار</button>
    </nav>
    <div class="reader-box">
      <div class="reader-label">القارئ</div>
      <select class="reader-select" id="readerSelect" onchange="changeReader()">
        <option value="Alafasy_128kbps">مشاري العفاسي</option>
        <option value="Abdurrahmaan_As-Sudais_192kbps">عبدالرحمن السديس</option>
        <option value="Husary_128kbps">محمود الحصري</option>
        <option value="Minshawy_Murattal_128kbps">محمد المنشاوي</option>
      </select>
    </div>
  </aside>
  <main class="main">
    <!-- القرآن -->
    <div id="page-quran" class="page active">
      <div id="list-view">
        <div class="topbar"><div class="page-title">القرآن الكريم</div><div>١١٤ سورة</div></div>
        <div class="surah-search-wrap"><input class="search-input" id="surahSearch" placeholder="ابحث عن سورة..." oninput="filterSurahs()"/></div>
        <div class="surah-grid" id="surahGrid"><div class="loading-wrap">جاري التحميل...</div></div>
      </div>
      <div id="reader-view" style="display:none">
        <button class="back-btn" onclick="backToList()" style="margin:16px 28px;padding:8px 18px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;">← العودة</button>
        <div class="reader-hero" style="padding:20px;text-align:center;"><div class="reader-surah-name" style="font-family:'Amiri';font-size:32px;color:var(--gold);" id="readerName"></div></div>
        <div class="ayah-wrap" id="ayahWrap"></div>
      </div>
    </div>
    <!-- الصحابة -->
    <div id="page-sahaba" class="page">
      <div style="padding:20px 28px;"><div style="font-family:'Amiri',serif;font-size:28px;color:var(--gold);">🌟 صحابة الرسول ﷺ</div></div>
      <div id="sahabaGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:20px 28px;"></div>
    </div>
    <!-- الأذكار -->
    <div id="page-athkar" class="page">
      <div style="padding:20px 28px;"><div style="font-family:'Amiri',serif;font-size:28px;color:var(--gold);">📿 الأذكار والرقية</div></div>
      <div class="athkar-content" id="athkarContent" style="padding:20px 28px;display:grid;gap:14px;"></div>
    </div>
    <!-- المصادر -->
    <div id="page-sources" class="page">
      <div style="padding:20px 28px;"><div style="font-family:'Amiri',serif;font-size:28px;color:var(--gold);">📚 المصادر</div></div>
      <div id="sourcesContent" style="padding:20px 28px;display:grid;gap:12px;"></div>
    </div>
  </main>
</div>
<audio id="audioEl"></audio>
<script>
// ========== البيانات ==========
const surahNames = [
  "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس",
  "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه",
  "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم",
  "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر",
  "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق",
  "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة",
  "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج",
  "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس",
  "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد",
  "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات",
  "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر",
  "المسد", "الإخلاص", "الفلق", "الناس"
];
const sahabaData = [
  {name:"أبو بكر الصديق",title:"أول الخلفاء الراشدين",story:"أول من آمن بالنبي ﷺ وصاحبه في الهجرة، عُرف بالصدق والعطف على الفقراء."},
  {name:"عمر بن الخطاب",title:"الفاروق",story:"أسهم في نشر العدل وفتح الأمصار، أسلم بعد قراءة القرآن."},
  {name:"عثمان بن عفان",title:"ذو النورين",story:"جمع القرآن الكريم في مصحف واحد، كان حيياً كريماً."},
  {name:"علي بن أبي طالب",title:"أسد الله",story:"ابن عم النبي وزوج فاطمة، باب مدينة العلم."},
  {name:"خالد بن الوليد",title:"سيف الله المسلول",story:"قائد عسكري لم يُهزم في معركة، أسلم عام فتح مكة."},
  {name:"بلال بن رباح",title:"مؤذن الإسلام",story:"أول مؤذن في الإسلام، رمز الصبر على الأذى."}
];
const adhkarList = [
  "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ (١٠٠ مرة)",
  "أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ",
  "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",
  "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ",
  "حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ"
];
const sourcesList = [
  "📖 المصحف الشريف (رواية حفص عن عاصم)",
  "📚 صحيح البخاري",
  "📚 صحيح مسلم",
  "📖 الأذكار للنووي",
  "📜 سيرة ابن هشام",
  "📚 تفسير ابن كثير"
];

const prayerTimesDB = {
  Riyadh: { fajr: "04:38", dhuhr: "11:48", asr: "15:08", maghrib: "17:42", isha: "19:12" },
  Mecca: { fajr: "04:55", dhuhr: "12:15", asr: "15:35", maghrib: "18:05", isha: "19:35" },
  Medina: { fajr: "04:50", dhuhr: "12:20", asr: "15:40", maghrib: "18:10", isha: "19:40" },
  Jeddah: { fajr: "04:58", dhuhr: "12:18", asr: "15:38", maghrib: "18:08", isha: "19:38" },
  Dammam: { fajr: "04:25", dhuhr: "11:35", asr: "14:55", maghrib: "17:25", isha: "18:55" },
  Abha: { fajr: "05:00", dhuhr: "12:12", asr: "15:30", maghrib: "18:02", isha: "19:32" },
  Tabuk: { fajr: "05:10", dhuhr: "12:30", asr: "15:50", maghrib: "18:20", isha: "19:50" },
  Buraidah: { fajr: "04:45", dhuhr: "11:55", asr: "15:15", maghrib: "17:45", isha: "19:15" },
  Hail: { fajr: "04:48", dhuhr: "12:08", asr: "15:28", maghrib: "18:00", isha: "19:30" },
  Najran: { fajr: "04:59", dhuhr: "12:09", asr: "15:28", maghrib: "18:00", isha: "19:30" }
};

let currentSection = "quran";
let selectedSurah = null;
let reader = 'Alafasy_128kbps';
let audio = document.getElementById('audioEl');
let cnt = {};

// ========== عرض المحتوى ==========
function renderContent() {
  const container = document.getElementById(`page-${currentSection}`);
  if(currentSection === "quran") {
    if(selectedSurah !== null) {
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('reader-view').style.display = 'block';
      document.getElementById('readerName').innerHTML = surahNames[selectedSurah];
      const ayahText = `بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ<br>${surahNames[selectedSurah]} : آيات من القرآن الكريم`;
      document.getElementById('ayahWrap').innerHTML = `<div class="ayah"><div class="ayah-text">${ayahText}</div></div>`;
    } else {
      document.getElementById('list-view').style.display = 'block';
      document.getElementById('reader-view').style.display = 'none';
      renderSurahList();
    }
  } 
  else if(currentSection === "sahaba") {
    document.getElementById('sahabaGrid').innerHTML = sahabaData.map(s => `
      <div class="surah-card"><div class="surah-name">${s.name}</div><div class="surah-english">${s.title}</div><div class="thikr-text" style="font-size:14px;">${s.story}</div></div>
    `).join('');
  }
  else if(currentSection === "athkar") {
    document.getElementById('athkarContent').innerHTML = adhkarList.map((t,i) => {
      const key = `adh_${i}`;
      if(!cnt[key]) cnt[key] = 0;
      return `<div class="ruqyah-card"><div class="thikr-text">${t}</div><div style="text-align:center;margin-top:10px;"><div id="cn-${key}">${cnt[key]}</div><button class="counter-btn" onclick="inc('${key}')">+</button></div></div>`;
    }).join('');
  }
  else if(currentSection === "sources") {
    document.getElementById('sourcesContent').innerHTML = sourcesList.map(s => `<div class="ruqyah-card"><div class="thikr-text" style="font-size:18px;">📌 ${s}</div></div>`).join('');
  }
}

function renderSurahList() {
  const searchVal = document.getElementById('surahSearch')?.value || '';
  const filtered = surahNames.filter((name, i) => name.includes(searchVal) || (i+1).toString().includes(searchVal));
  document.getElementById('surahGrid').innerHTML = filtered.map((name, idx) => {
    const originalIdx = surahNames.indexOf(name);
    return `<div class="surah-card" onclick="openSurah(${originalIdx})"><div class="surah-num">${originalIdx+1}</div><div class="surah-name">${name}</div><div class="surah-english">سورة</div></div>`;
  }).join('');
}

function openSurah(idx) {
  selectedSurah = idx;
  renderContent();
}

function backToList() {
  selectedSurah = null;
  renderContent();
}

function filterSurahs() {
  renderSurahList();
}

function inc(k) {
  cnt[k] = (cnt[k] || 0) + 1;
  const el = document.getElementById(`cn-${k}`);
  if(el) el.textContent = cnt[k];
}

// ========== الصلاة ==========
function updatePrayerTimes(city) {
  const times = prayerTimesDB[city] || prayerTimesDB.Riyadh;
  document.getElementById('p-fajr').innerHTML = times.fajr;
  document.getElementById('p-dhuhr').innerHTML = times.dhuhr;
  document.getElementById('p-asr').innerHTML = times.asr;
  document.getElementById('p-maghrib').innerHTML = times.maghrib;
  document.getElementById('p-isha').innerHTML = times.isha;
}

async function loadPrayer() {
  try {
    const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout:5000}));
    const {latitude, longitude} = pos.coords;
    const date = new Date();
    const res = await fetch(`https://api.aladhan.com/v1/timings/${date.getDate()}-${date.getMonth()+1}-${date.getFullYear()}?latitude=${latitude}&longitude=${longitude}&method=4`);
    const data = await res.json();
    if(data.data) {
      const t = data.data.timings;
      document.getElementById('p-fajr').innerHTML = t.Fajr?.slice(0,5) || '--:--';
      document.getElementById('p-dhuhr').innerHTML = t.Dhuhr?.slice(0,5) || '--:--';
      document.getElementById('p-asr').innerHTML = t.Asr?.slice(0,5) || '--:--';
      document.getElementById('p-maghrib').innerHTML = t.Maghrib?.slice(0,5) || '--:--';
      document.getElementById('p-isha').innerHTML = t.Isha?.slice(0,5) || '--:--';
    }
    document.getElementById('locationPermBox').style.display = 'none';
  } catch(e) { document.getElementById('locationPermBox').style.display = 'block'; }
}

function loadByCity() {
  const city = document.getElementById('citySelect').value;
  updatePrayerTimes(city);
  document.getElementById('locationPermBox').style.display = 'none';
}

// ========== التنقل بين الصفحات ==========
function showPage(pageId, btn) {
  currentSection = pageId;
  selectedSurah = null;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${pageId}`).classList.add('active');
  document.querySelectorAll('.nav-btn-top').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderContent();
}

function switchPage(pageId, btn) {
  currentSection = pageId;
  selectedSurah = null;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${pageId}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderContent();
}

function changeReader() {
  reader = document.getElementById('readerSelect').value;
}

// ========== الوضع النهاري ==========
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  document.getElementById('themeBtn').innerHTML = isLight ? '🌙 ليلي' : '☀️ نهاري';
}

// ========== تهيئة ==========
loadPrayer();
updatePrayerTimes('Riyadh');
renderContent();

themeBtn.id = 'themeBtn';

themeBtn.style.position = 'fixed';

themeBtn.style.left = '20px';
themeBtn.style.padding = '10px 16px';
themeBtn.style.background = 'rgba(201,168,76,0.2)';
themeBtn.style.border = '1px solid var(--gold)';
themeBtn.style.color = 'var(--gold)';
themeBtn.style.borderRadius = '40px';
themeBtn.style.cursor = 'pointer';
themeBtn.style.zIndex = '999';
themeBtn.onclick = toggleTheme;
document.body.appendChild(themeBtn);
</script>
